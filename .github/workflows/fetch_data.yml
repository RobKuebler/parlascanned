name: Fetch data

on:
  schedule:
    - cron: "0 4 * * *" # daily at 4am UTC
  workflow_dispatch: # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      changed: ${{ steps.data_changed.outputs.changed }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Fetch data
        run: uv run python src/fetch_data.py

      - name: Check for data changes
        id: data_changed
        run: |
          git add data/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.data_changed.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: aktualisiere Daten $(date -u +%Y-%m-%d)"
          git pull --rebase && git push

  train:
    needs: fetch
    if: needs.fetch.outputs.changed == 'true'
    uses: ./.github/workflows/train_model.yml
