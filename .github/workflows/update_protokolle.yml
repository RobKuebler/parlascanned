name: Update Plenarprotokolle

on:
  schedule:
    - cron: "0 5 * * *" # daily at 5am UTC (after update_data)
  workflow_dispatch: # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Determine current Wahlperiode
        id: current_wp
        run: |
          wp=$(uv run python3 -c "
          import pandas as pd
          from datetime import date
          df = pd.read_csv('data/periods.csv')
          today = str(date.today())
          row = df[(df['start_date'] <= today) & (df['end_date'] >= today)]
          if row.empty:
              row = df.iloc[[-1]]  # fallback: use latest known period
          print(int(row.iloc[0]['bundestag_number']))
          ")
          echo "wahlperiode=$wp" >> "$GITHUB_OUTPUT"
          echo "Current Wahlperiode: $wp"

      - name: Determine period_id for cache key
        id: current_period
        run: |
          pid=$(uv run python3 -c "
          import pandas as pd
          from datetime import date
          df = pd.read_csv('data/periods.csv')
          today = str(date.today())
          row = df[(df['start_date'] <= today) & (df['end_date'] >= today)]
          if row.empty:
              row = df.iloc[[-1]]
          print(int(row.iloc[0]['period_id']))
          ")
          echo "period_id=$pid" >> "$GITHUB_OUTPUT"

      - name: Fetch new Plenarprotokolle
        run: uv run python -m src.fetch_protokolle --wahlperiode ${{ steps.current_wp.outputs.wahlperiode }}

      - name: Cache Plenarprotokoll XMLs and speeches
        uses: actions/cache@v4
        with:
          path: |
            data/${{ steps.current_period.outputs.period_id }}/plenarprotokolle/
            data/${{ steps.current_period.outputs.period_id }}/speeches.csv
          key: plenarprotokolle-wp${{ steps.current_wp.outputs.wahlperiode }}-${{ hashFiles(format('data/{0}/dip_plenarprotokolle.csv', steps.current_period.outputs.period_id)) }}
          restore-keys: plenarprotokolle-wp${{ steps.current_wp.outputs.wahlperiode }}-

      - name: Download new XMLs
        id: fetch_xml
        run: |
          output=$(uv run python -m src.fetch_protokoll_xml --wahlperiode ${{ steps.current_wp.outputs.wahlperiode }} 2>&1)
          echo "$output"
          if echo "$output" | grep -q "0 neue XMLs"; then
            echo "new_xmls=false" >> "$GITHUB_OUTPUT"
          else
            echo "new_xmls=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Parse speeches from XMLs
        if: steps.fetch_xml.outputs.new_xmls == 'true'
        run: uv run python -m src.parse_protokolle --wahlperiode ${{ steps.current_wp.outputs.wahlperiode }}

      - name: Compute TF-IDF word stats
        if: steps.fetch_xml.outputs.new_xmls == 'true'
        run: uv run python -m src.compute_word_stats --wahlperiode ${{ steps.current_wp.outputs.wahlperiode }}

      - name: Export JSON for frontend
        if: steps.fetch_xml.outputs.new_xmls == 'true'
        run: uv run python -m src.export_json

      - name: Commit and push
        if: steps.fetch_xml.outputs.new_xmls == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ frontend/public/data/
          git diff --staged --quiet || git commit -m "data: update Plenarprotokolle WP${{ steps.current_wp.outputs.wahlperiode }} $(date -u +%Y-%m-%d)"
          git pull --rebase && git push
